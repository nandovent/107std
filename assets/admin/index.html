<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel 107 — Portfólio</title><link rel="icon" href="../assets/images/icon-orange.png"><link rel="stylesheet" href="../assets/css/admin.css"></head><body><main class="admin-shell"><header class="admin-header"><img src="../assets/images/logo-vertical-offwhite.png" alt="107 Studios"><div><span>PAINEL PRIVADO</span><h1>PORTFÓLIO.</h1></div></header><section class="login-card" id="login-card"><h2>ENTRAR.</h2><p>Digite a senha configurada na Vercel.</p><input id="password" type="password" placeholder="Senha do painel"><button id="login">Entrar</button><div class="status" id="login-status"></div></section><section class="admin-app" id="admin-app" hidden><div class="toolbar"><button id="new-video">+ Novo vídeo</button><button class="ghost" id="reload">Recarregar</button><a class="ghost link" href="../portfolio/" target="_blank">Abrir portfólio</a><button id="publish">Publicar alterações</button></div><div class="status" id="status"></div><div id="video-list" class="video-list"></div></section></main><template id="video-template"><article class="video-editor"><div class="editor-top"><div class="editor-heading"><span class="position-badge">01</span><strong class="editor-title">NOVO VÍDEO</strong></div><div><button type="button" class="move-up ghost" title="Mover para cima" aria-label="Mover para cima">↑</button><button type="button" class="move-down ghost" title="Mover para baixo" aria-label="Mover para baixo">↓</button><button class="remove danger">Excluir</button></div></div><div class="form-grid"><label>Categoria
  <select data-field="categoria"></select>
  <small>Escolha uma categoria existente ou selecione “Cadastrar nova categoria”.</small>
</label>
<label class="new-category-field" hidden>Nova categoria
  <input data-field="nova-categoria" placeholder="Exemplo: Bastidores">
  <small>Ao publicar o primeiro vídeo, o novo bloco será criado automaticamente no portfólio.</small>
</label><label>Título<input data-field="titulo" placeholder="Nome do filme"></label><label class="full">Descrição<textarea data-field="descricao" rows="3" placeholder="Descrição curta"></textarea></label><label class="full">Link do YouTube ou Vimeo<input data-field="link" placeholder="https://www.youtube.com/watch?v=..."></label><label>Posição<input data-field="ordem" type="number" min="1"><small>Digite a posição ou use as setas acima.</small></label><label class="check"><input data-field="publicado" type="checkbox" checked> Publicado</label></div></article></template><script src="../assets/js/admin.js"></script></body></html>
