<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel 107 — Clientes</title><link rel="icon" href="../../assets/images/icon-orange.png"><link rel="stylesheet" href="../../assets/css/admin.css?v=04.2.2"><style>
.logo-list{display:grid;gap:16px}.logo-editor{background:#f8f5df;color:#111;border-radius:24px;padding:20px;display:grid;grid-template-columns:150px 1fr;gap:20px}.logo-preview{height:95px;border-radius:16px;background:#171717;display:grid;place-items:center;padding:18px;overflow:hidden}.logo-preview img{max-width:110px;max-height:48px;object-fit:contain}.logo-form{display:grid;grid-template-columns:minmax(0,1fr) 110px;gap:14px}.logo-form label{display:grid;gap:7px;font-weight:800;font-size:12px;text-transform:uppercase}.logo-form .full{grid-column:1/-1}.logo-form input[type=text],.logo-form input[type=number],.logo-form input[type=file],.logo-form input[type=range]{width:100%;padding:13px;border:1px solid #d5d0b7;border-radius:12px;background:#fff;font:inherit}.logo-form input[type=range]{padding:10px}.size-control{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}.size-value{min-width:52px;text-align:right;font-weight:900;color:#ef431d}.logo-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;grid-column:1/-1}.panel-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}@media(max-width:650px){.logo-editor{grid-template-columns:1fr}.logo-form{grid-template-columns:1fr}.logo-form .full{grid-column:auto}}
</style></head><body><main class="admin-shell"><header class="admin-header"><img src="../../assets/images/logo-vertical-offwhite.png" alt="107 Studios"><div><span>PAINEL PRIVADO</span><h1>CLIENTES.</h1></div></header><section class="login-card" id="login-card"><h2>ENTRAR.</h2><p>Use a mesma senha do painel do portfólio.</p><input id="password" type="password" placeholder="Senha do painel"><button id="login">Entrar</button><div class="status" id="login-status"></div></section><section class="admin-app" id="admin-app" hidden><div class="panel-nav"><a class="ghost link" href="../">Vídeos</a><a class="ghost link" href="../../" target="_blank">Abrir site</a></div><div class="toolbar"><button id="new-logo">+ Nova logo</button><button class="ghost" id="reload">Recarregar</button><button id="publish">Publicar alterações</button></div><div class="status" id="status"></div><div class="logo-list" id="logo-list"></div><div class="toolbar toolbar-bottom"><button id="new-logo-bottom">+ Nova logo</button><button class="ghost" id="reload-bottom">Recarregar</button><button id="publish-bottom">Publicar alterações</button></div></section></main><template id="logo-template"><article class="logo-editor"><div class="logo-preview"><img alt="Prévia da logo"></div><div class="logo-form"><label>Nome<input type="text" data-field="nome" placeholder="Nome do cliente"></label><label>Posição<input type="number" min="1" data-field="ordem"></label><label class="full">Arquivo monocromático<input type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" data-field="arquivo"><small>Preferência: SVG ou PNG transparente. Até 800 × 400 px.</small></label><label class="full">Tamanho no carrossel<div class="size-control"><input type="range" min="55" max="250" step="5" value="100" data-field="escala"><span class="size-value">100%</span></div><small>Redimensiona apenas a exibição no site, sem alterar o arquivo original.</small></label><div class="logo-actions"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" data-field="publicado" checked> Publicada</label><button class="danger remove" type="button">Excluir</button></div></div></article></template><script src="../../assets/js/clientes-admin.js?v=04.2.17"></script></body></html>
