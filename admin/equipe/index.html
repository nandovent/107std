<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel 107 — Equipe</title><link rel="icon" href="../../assets/images/icon-orange.png"><link rel="stylesheet" href="../../assets/css/admin.css?v=04.2.9"><style>
.team-list{display:grid;gap:16px}.team-editor{background:#f8f5df;color:#111;border-radius:24px;padding:20px;display:grid;grid-template-columns:190px 1fr;gap:20px}.team-preview{height:230px;border-radius:18px;background:#171717;display:grid;place-items:center;overflow:hidden;position:relative}.team-preview img{width:100%;height:100%;object-fit:cover;transform:scale(1);transform-origin:center}.team-preview span{color:#f8f5df;font-weight:900;text-transform:uppercase;font-size:11px;letter-spacing:.1em}.team-form{display:grid;grid-template-columns:minmax(0,1fr) 120px;gap:14px}.team-form label{display:grid;gap:7px;font-weight:800;font-size:12px;text-transform:uppercase}.team-form .full{grid-column:1/-1}.team-form input[type=text],.team-form input[type=number],.team-form input[type=file],.team-form input[type=range]{width:100%;padding:13px;border:1px solid #d5d0b7;border-radius:12px;background:#fff;font:inherit}.team-form input[type=range]{padding:10px}.size-control{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}.size-value{min-width:52px;text-align:right;font-weight:900;color:#ef431d}.team-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;grid-column:1/-1;flex-wrap:wrap}.team-checks{display:flex;align-items:center;gap:18px;flex-wrap:wrap}.panel-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}@media(max-width:700px){.team-editor{grid-template-columns:1fr}.team-preview{height:300px}.team-form{grid-template-columns:1fr}.team-form .full{grid-column:auto}}
</style></head><body><main class="admin-shell"><header class="admin-header"><img src="../../assets/images/logo-vertical-offwhite.png" alt="107 Studios"><div><span>PAINEL PRIVADO</span><h1>EQUIPE.</h1></div></header><section class="login-card" id="login-card"><h2>ENTRAR.</h2><p>Use a mesma senha do painel do portfólio.</p><input id="password" type="password" placeholder="Senha do painel"><button id="login">Entrar</button><div class="status" id="login-status"></div></section><section class="admin-app" id="admin-app" hidden><div class="panel-nav"><a class="ghost link" href="../">Vídeos</a><a class="ghost link" href="../clientes/">Clientes</a><a class="ghost link" href="../../#equipe" target="_blank">Abrir equipe no site</a></div><div class="toolbar"><button id="new-member">+ Novo integrante</button><button class="ghost" id="reload">Recarregar</button><button id="publish">Publicar alterações</button></div><div class="status" id="status"></div><div class="team-list" id="team-list"></div><div class="toolbar toolbar-bottom"><button id="new-member-bottom">+ Novo integrante</button><button class="ghost" id="reload-bottom">Recarregar</button><button id="publish-bottom">Publicar alterações</button></div></section></main><template id="team-template"><article class="team-editor"><div class="team-preview"><img alt="Prévia do integrante"><span>Foto</span></div><div class="team-form"><label>Nome<input type="text" data-field="nome" placeholder="Nome da pessoa"></label><label>Posição<input type="number" min="1" data-field="ordem"></label><label class="full">Função<input type="text" data-field="funcao" placeholder="Exemplo: Videomaker e editor"></label><label class="full">Instagram<input type="text" data-field="instagram" placeholder="@usuario ou link completo do Instagram"><small>O perfil será exibido como link no card da equipe.</small></label><label class="full">Foto<input type="file" accept="image/png,image/jpeg,image/webp" data-field="arquivo"><small>Preferência: JPG ou WEBP vertical, com pelo menos 1000 px de altura.</small></label><label class="full">Tamanho da foto<div class="size-control"><input type="range" min="60" max="170" step="5" value="100" data-field="escala"><span class="size-value">100%</span></div><small>Ajusta o enquadramento no card sem alterar o arquivo original.</small></label><div class="team-actions"><div class="team-checks"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" data-field="publicado" checked> Publicado</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" data-field="destaque"> Card em destaque</label></div><button class="danger remove" type="button">Excluir</button></div></div></article></template><script src="../../assets/js/equipe-admin.js?v=04.2.9"></script></body></html>
